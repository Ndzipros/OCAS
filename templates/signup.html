<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCAS — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Source Sans 3',sans-serif; background:#04091A; color:#E8EDF8; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }

.back-link { position:fixed; top:20px; left:28px; display:flex; align-items:center; gap:8px; color:rgba(232,237,248,0.38); text-decoration:none; font-size:13px; transition:color 0.18s; }
.back-link:hover { color:#E8EDF8; }
.back-link svg { width:16px; height:16px; }

.card { width:100%; max-width:420px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:40px 36px; animation:fadeUp 0.4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }

.logo { display:flex; align-items:center; gap:11px; justify-content:center; margin-bottom:36px; text-decoration:none; }
.logo-mark { width:38px; height:38px; background:#FFD60A; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.logo-mark svg { width:20px; height:20px; }
.logo-name { font-family:'EB Garamond',Georgia,serif; font-size:22px; font-weight:600; letter-spacing:3px; color:#E8EDF8; line-height:1; }
.logo-name span { color:#FFD60A; }
.logo-sub { font-size:8.5px; color:rgba(232,237,248,0.26); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }

.card-title { font-family:'EB Garamond',Georgia,serif; font-size:28px; font-weight:500; color:#E8EDF8; text-align:center; margin-bottom:6px; }
.card-desc { font-size:13px; color:rgba(232,237,248,0.36); text-align:center; margin-bottom:28px; font-weight:300; }

.error-msg { background:rgba(200,50,50,0.1); border:1px solid rgba(200,50,50,0.22); color:#FF9999; padding:11px 14px; border-radius:8px; font-size:13px; margin-bottom:20px; }

.field { margin-bottom:15px; }
.field label { display:block; font-size:10.5px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:rgba(232,237,248,0.32); margin-bottom:7px; }
.field input { width:100%; background:rgba(255,255,255,0.055); border:1px solid rgba(255,255,255,0.09); border-radius:8px; padding:12px 14px; color:#E8EDF8; font-family:'Source Sans 3',sans-serif; font-size:14.5px; outline:none; transition:all 0.2s; }
.field input::placeholder { color:rgba(232,237,248,0.18); }
.field input:focus { border-color:#FFD60A; background:rgba(255,214,10,0.04); box-shadow:0 0 0 3px rgba(255,214,10,0.07); }

.btn-submit { width:100%; margin-top:8px; background:#FFD60A; color:#04091A; border:none; border-radius:8px; padding:14px; font-family:'Source Sans 3',sans-serif; font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all 0.2s; }
.btn-submit:hover { background:#e6c000; transform:translateY(-1px); box-shadow:0 8px 22px rgba(255,214,10,0.18); }

.divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
.divider-line { flex:1; height:1px; background:rgba(255,255,255,0.07); }
.divider-text { font-size:11.5px; color:rgba(232,237,248,0.24); white-space:nowrap; }

.btn-login { display:block; width:100%; text-align:center; padding:13px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); color:rgba(232,237,248,0.7); font-size:13.5px; font-weight:500; text-decoration:none; transition:all 0.18s; }
.btn-login:hover { background:rgba(255,255,255,0.05); color:#E8EDF8; border-color:rgba(255,255,255,0.18); }

.hint { font-size:11px; color:rgba(232,237,248,0.22); margin-top:4px; }
</style>
</head>
<body>

<a href="/" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  Back to home
</a>

<div class="card">
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 26 26" fill="none">
        <circle cx="13" cy="13" r="3" fill="#04091A"/>
        <path d="M8.5 17.5a6.5 6.5 0 0 1 0-9" stroke="#04091A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M17.5 8.5a6.5 6.5 0 0 1 0 9" stroke="#04091A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M5.5 20.5a11 11 0 0 1 0-15" stroke="#04091A" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M20.5 5.5a11 11 0 0 1 0 15" stroke="#04091A" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <div><div class="logo-name">OC<span>A</span>S</div><div class="logo-sub">Campus Alert System</div></div>
  </a>

  <div class="card-title">Create Account</div>
  <div class="card-desc">Join your campus alert network today</div>

  {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}

  <form method="POST">
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="fullname" placeholder="e.g. Jane Doe" required autofocus>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="At least 6 characters" required>
      <div class="hint">Minimum 6 characters</div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="Repeat your password" required>
    </div>
    <button type="submit" class="btn-submit">Create Account</button>
  </form>

  <div class="divider"><div class="divider-line"></div><div class="divider-text">Already have an account?</div><div class="divider-line"></div></div>
  <a href="/login" class="btn-login">Sign In Instead</a>
</div>

</body>
</html>
